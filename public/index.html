<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 레시피</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── 네비게이션 바 ──────────────────────────────────────────── -->
  <nav class="navbar">
    <span class="nav-brand">🧊 냉장고 레시피</span>
    <div class="nav-right" id="navAuth">
      <button class="btn-nav" id="btnShowAuth">로그인 / 회원가입</button>
    </div>
  </nav>

  <!-- ── 메인 컨테이너 ──────────────────────────────────────────── -->
  <div class="container">

    <!-- Step 1: 재료 인식 -->
    <div id="step1">
      <h1>냉장고 재료 인식</h1>
      <p class="subtitle">냉장고 사진을 올리면 AI가 재료를 찾아드려요</p>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <span class="upload-icon">📷</span>
          <p>드래그 앤 드롭하거나<br /><strong>클릭해서 파일 선택</strong></p>
          <p class="upload-hint">JPEG · PNG · WebP · 최대 10MB</p>
        </div>
        <img id="preview" class="preview hidden" alt="미리보기" />
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
      </div>

      <button class="btn-analyze" id="btnAnalyze" disabled>재료 분석하기</button>

      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p>AI가 재료를 분석 중이에요…</p>
      </div>
      <div class="error-box hidden" id="errorBox">
        <p id="errorMsg"></p>
        <button class="btn-retry" id="btnRetry">다시 시도</button>
      </div>

      <div class="ingredients-section hidden" id="ingredientsSection">
        <h2>인식된 재료</h2>
        <div class="tag-list" id="tagList"></div>
        <div class="add-ingredient">
          <input type="text" id="newIngredient" placeholder="재료 직접 추가" maxlength="20" />
          <button class="btn-add" id="btnAdd">+ 추가</button>
        </div>
      </div>

      <button class="btn-next hidden" id="btnNext">레시피 추천받기 →</button>
    </div>

    <!-- Step 2: 레시피 추천 -->
    <div id="step2" class="hidden">
      <div class="step2-header">
        <button class="btn-back" id="btnBack">← 재료 수정</button>
        <h1>🍳 레시피 추천</h1>
      </div>
      <p class="ingredient-summary" id="ingredientSummary"></p>

      <div class="filter-bar">
        <select id="filterTime">
          <option value="0">⏱ 시간 제한 없음</option>
          <option value="15">⏱ 15분 이하</option>
          <option value="30">⏱ 30분 이하</option>
        </select>
        <select id="filterDifficulty">
          <option value="">★ 난이도 무관</option>
          <option value="쉬움">★ 쉬움</option>
          <option value="보통">★ 보통</option>
          <option value="어려움">★ 어려움</option>
        </select>
        <button class="btn-regen" id="btnRegenerate">↺ 재생성</button>
      </div>

      <div class="loading hidden" id="recipeLoading">
        <div class="spinner"></div>
        <p>AI가 레시피를 생성 중이에요…</p>
      </div>
      <div class="error-box hidden" id="recipeErrorBox">
        <p id="recipeErrorMsg"></p>
        <button class="btn-retry" id="btnRecipeRetry">다시 시도</button>
      </div>

      <div class="recipe-grid" id="recipeGrid"></div>
    </div>

    <!-- Step 3: 레시피북 -->
    <div id="step3" class="hidden">
      <div class="step3-header">
        <button class="btn-back" id="btnBackFromBook">← 홈으로</button>
        <h1>📖 나의 레시피북</h1>
        <button class="btn-nav-outline" id="btnEditProfile">👤 프로필 편집</button>
      </div>

      <div class="profile-badge" id="profileBadge"></div>

      <div class="book-toolbar">
        <input type="text" id="searchRecipe" placeholder="🔍 레시피 검색…" />
        <select id="bookFilterTime">
          <option value="0">⏱ 시간 무관</option>
          <option value="15">⏱ 15분 이하</option>
          <option value="30">⏱ 30분 이하</option>
        </select>
        <select id="bookFilterDiff">
          <option value="">★ 난이도 무관</option>
          <option value="쉬움">★ 쉬움</option>
          <option value="보통">★ 보통</option>
          <option value="어려움">★ 어려움</option>
        </select>
      </div>

      <p class="recipe-count" id="recipeCount"></p>
      <div class="recipe-grid" id="savedRecipeGrid"></div>
      <p class="empty-book hidden" id="emptyBook">저장된 레시피가 없어요. 레시피를 추천받고 저장해보세요!</p>
    </div>

  </div>

  <!-- ── 인증 모달 ────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal">
      <button class="modal-close" id="authModalClose">×</button>
      <div class="modal-tabs">
        <button class="tab active" data-tab="login">로그인</button>
        <button class="tab" data-tab="signup">회원가입</button>
      </div>

      <div id="loginPane">
        <div class="form-group">
          <input type="email" id="loginEmail" placeholder="이메일" autocomplete="email" />
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password" />
        </div>
        <p class="auth-error hidden" id="loginError"></p>
        <button class="btn-auth" id="btnLogin">로그인</button>
      </div>

      <div id="signupPane" class="hidden">
        <div class="form-group">
          <input type="email" id="signupEmail" placeholder="이메일" autocomplete="email" />
        </div>
        <div class="form-group">
          <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <input type="text" id="signupNickname" placeholder="닉네임 (1~20자)" maxlength="20" />
        </div>
        <p class="auth-error hidden" id="signupError"></p>
        <button class="btn-auth" id="btnSignup">회원가입</button>
      </div>
    </div>
  </div>

  <!-- ── 프로필 편집 모달 ─────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="profileModal">
    <div class="modal">
      <button class="modal-close" id="profileModalClose">×</button>
      <h2>프로필 편집</h2>

      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="profileNickname" placeholder="닉네임" maxlength="20" />
      </div>

      <div class="form-group">
        <label>식이 제한</label>
        <div class="checkbox-grid">
          <label class="check-item"><input type="checkbox" value="채식/비건" /> 채식/비건</label>
          <label class="check-item"><input type="checkbox" value="글루텐 프리" /> 글루텐 프리</label>
          <label class="check-item"><input type="checkbox" value="유제품 제외" /> 유제품 제외</label>
          <label class="check-item"><input type="checkbox" value="견과류 제외" /> 견과류 제외</label>
        </div>
      </div>

      <div class="form-group">
        <label>선호 요리 스타일</label>
        <div class="checkbox-grid">
          <label class="check-item"><input type="checkbox" value="한식" /> 한식</label>
          <label class="check-item"><input type="checkbox" value="양식" /> 양식</label>
          <label class="check-item"><input type="checkbox" value="중식" /> 중식</label>
          <label class="check-item"><input type="checkbox" value="일식" /> 일식</label>
          <label class="check-item"><input type="checkbox" value="인도식" /> 인도식</label>
        </div>
      </div>

      <p class="auth-error hidden" id="profileError"></p>
      <button class="btn-auth" id="btnSaveProfile">저장</button>
    </div>
  </div>

  <!-- ── 토스트 ────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
